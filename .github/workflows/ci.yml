name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref, but never interrupt a main-branch
# run mid-publish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # On a PR into main, require the version to be raised above the base branch.
  # (A push straight to main is not gated here — see the publish job, which
  # simply skips publishing when the version is unchanged, so docs/other
  # non-code pushes don't need a bump.)
  version-check:
    name: Version bump check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history to read pyproject.toml at the base

      - name: Ensure pyproject version was bumped
        run: python3 tools/check_version_bump.py "${{ github.event.pull_request.base.sha }}"

  test:
    name: Lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest

  publish:
    name: Publish Linux binaries
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create tags/releases via GITHUB_TOKEN
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need the previous commit to detect a version bump

      # Only publish when this push raised the version. Docs/other non-code
      # pushes leave it unchanged and are skipped here (without failing).
      - name: Decide whether to publish
        id: gate
        run: |
          baseline="${{ github.event.before }}"
          if [ -z "$baseline" ] || [ "$baseline" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to compare against; skipping publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            publish="$(python3 tools/check_version_bump.py --gate "$baseline")"
            echo "version bumped since previous commit: $publish"
            echo "publish=$publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.gate.outputs.publish != 'true'
        run: echo "Version unchanged since the previous commit — nothing to publish."

      - name: Install uv
        if: steps.gate.outputs.publish == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (locked)
        if: steps.gate.outputs.publish == 'true'
        run: uv sync --frozen

      # pex cross-builds both arches from this x86_64 host: each --scie-platform
      # downloads the matching embedded interpreter and --platform resolves the
      # matching manylinux wheels (e.g. pydantic-core).
      - name: Build linux x86_64 + aarch64 executables
        if: steps.gate.outputs.publish == 'true'
        run: make build-linux

      - name: Create release for the current version (skip if it exists)
        if: steps.gate.outputs.publish == 'true'
        run: |
          set -euo pipefail
          version="$(python3 tools/check_version_bump.py --current)"
          tag="v${version}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists — nothing to publish."
            exit 0
          fi
          echo "Publishing release $tag"
          gh release create "$tag" \
            dist/fonfon-linux-x86_64 \
            dist/fonfon-linux-aarch64 \
            --title "$tag" \
            --generate-notes
